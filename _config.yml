# Personnalisation CSS avancée (inspiration CSA)
# À placer dans assets/css/style.scss
custom_css: |
  /* Palette CSA */
  :root {
    --csa-blue: #0033A0;
    --csa-light-blue: #0077B6;
    --csa-gray: #F5F7FA;
    --csa-dark: #1A2C3E;
  }

  /* Header */
  .site-header {
    border-bottom: 3px solid var(--csa-blue);
    background: white;
  }

  .site-title {
    color: var(--csa-blue);
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* Navigation */
  .nav-links a {
    color: var(--csa-dark);
    font-weight: 500;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: var(--csa-blue);
    text-decoration: none;
  }

  /* Boutons et éléments interactifs */
  .btn-primary {
    background: var(--csa-blue);
    border: none;
  }

  .btn-primary:hover {
    background: var(--csa-light-blue);
  }

  /* Cartes projet */
  .project-card {
    border: 1px solid #E5E9F0;
    border-radius: 8px;
    padding: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .project-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 51, 160, 0.12);
    border-color: var(--csa-light-blue);
  }

  /* Footer */
  .site-footer {
    background: var(--csa-gray);
    border-top: 1px solid #E5E9F0;
    padding: 2rem 0;
    margin-top: 3rem;
  }

  .footer-social a {
    color: var(--csa-dark);
    margin: 0 12px;
    font-size: 1.2rem;
  }

  .footer-social a:hover {
    color: var(--csa-blue);
  }

  /* Typographie */
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--csa-dark);
    line-height: 1.6;
  }

  h1, h2, h3 {
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  h2 {
    border-left: 4px solid var(--csa-blue);
    padding-left: 1rem;
  }

  /* Badges compétences */
  .skill-badge {
    background: #EFF3F8;
    color: var(--csa-dark);
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
    display: inline-block;
    margin: 0.25rem;
  }

/* Configuration du thème minimal */
logo: /assets/img/logo.png
show_downloads: false
